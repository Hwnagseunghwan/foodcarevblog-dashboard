name: 네이버 블로그 조회수 수집

on:
  schedule:
    - cron: '0 14 * * *'  # 매일 23:00 KST (UTC+9 = UTC 14:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install playwright gspread pandas python-dotenv
          playwright install chromium --with-deps

      - name: 조회수 수집 실행
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
        run: python naver_scraper.py

      - name: 데이터 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog_visitors.json
          git diff --staged --quiet || git commit -m "data: $(date +'%Y-%m-%d') 조회수 업데이트"
          git push
